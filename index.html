<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can Köfte & Döner Salonu - Çok Yakında</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4a853;
            --gold-light: #f4d03f;
            --dark: #1a1a1a;
            --cream: #f5f0e8;
            --burgundy: #722f37;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(212, 168, 83, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(114, 47, 55, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(212, 168, 83, 0.05) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Logo Section */
        .logo-section {
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        .logo-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
        }

        /* PC Boyut */
        @media (min-width: 769px) {
            .logo-placeholder {
                width: 400px;
            }
        }

        /* Telefon Boyut */
        @media (max-width: 768px) {
            .logo-placeholder {
                width: 90%;
                max-width: 350px;
            }
        }

        @media (max-width: 480px) {
            .logo-placeholder {
                width: 85%;
            }
        }

        .logo-placeholder img {
            width: 100%;
            height: auto;
            object-fit: contain;
            border-radius: 15px;
            aspect-ratio: 872 / 580;
            transition: transform 0.3s ease;
        }

        .logo-placeholder:hover img {
            transform: scale(1.02);
        }

        /* Brand Name */
        .brand-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #e8c547 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 15px;
            animation: fadeInDown 1s ease-out 0.2s both;
        }

        /* PC */
        @media (min-width: 769px) {
            .brand-name {
                font-size: clamp(2rem, 5vw, 3.5rem);
                letter-spacing: 6px;
            }
        }

        /* Telefon */
        @media (max-width: 768px) {
            .brand-name {
                font-size: clamp(1.3rem, 6vw, 2rem);
                letter-spacing: 3px;
                padding: 0 15px;
            }
        }

        @media (max-width: 400px) {
            .brand-name {
                font-size: 1.1rem;
                letter-spacing: 2px;
            }
        }

        /* Main Heading */
        .main-heading {
            text-align: center;
            margin: 10px 0 25px 0;
        }

        .coming-soon {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #e8c547 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textGlow 3s ease-in-out infinite;
            letter-spacing: 5px;
        }

        /* PC */
        @media (min-width: 769px) {
            .coming-soon {
                font-size: clamp(3rem, 8vw, 6rem);
            }
        }

        /* Telefon */
        @media (max-width: 768px) {
            .coming-soon {
                font-size: clamp(2rem, 10vw, 3.5rem);
                letter-spacing: 3px;
            }
        }

        @keyframes textGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(212, 168, 83, 0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(212, 168, 83, 0.8)); }
        }

        /* Divider */
        .divider {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 25px auto;
            animation: expandLine 1.5s ease-out 0.5s both;
        }

        @keyframes expandLine {
            from { width: 0; opacity: 0; }
            to { width: 150px; opacity: 1; }
        }

        /* Description */
        .description {
            max-width: 650px;
            text-align: center;
            padding: 0 25px;
            animation: fadeInUp 1s ease-out 0.7s both;
        }

        .description p {
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
        }

        /* PC */
        @media (min-width: 769px) {
            .description p {
                font-size: 1.15rem;
            }
        }

        /* Telefon */
        @media (max-width: 768px) {
            .description p {
                font-size: 0.95rem;
                line-height: 1.6;
            }
        }

        .highlight {
            color: var(--gold);
            font-weight: 600;
        }

        /* Location Badge */
        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.2), rgba(212, 168, 83, 0.1));
            border: 1px solid rgba(212, 168, 83, 0.4);
            border-radius: 50px;
            margin: 30px 0;
            animation: fadeInUp 1s ease-out 0.9s both;
            transition: all 0.3s ease;
        }

        /* PC */
        @media (min-width: 769px) {
            .location-badge {
                padding: 15px 30px;
            }

            .location-badge span {
                font-size: 1.1rem;
                letter-spacing: 3px;
            }
        }

        /* Telefon */
        @media (max-width: 768px) {
            .location-badge {
                padding: 12px 22px;
                gap: 8px;
            }

            .location-badge span {
                font-size: 0.85rem;
                letter-spacing: 2px;
            }
        }

        .location-badge:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(212, 168, 83, 0.2);
        }

        .location-badge svg {
            fill: var(--gold);
            animation: pulse 2s infinite;
        }

        /* PC */
        @media (min-width: 769px) {
            .location-badge svg {
                width: 26px;
                height: 26px;
            }
        }

        /* Telefon */
        @media (max-width: 768px) {
            .location-badge svg {
                width: 22px;
                height: 22px;
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .location-badge span {
            color: var(--gold);
            font-weight: 500;
        }

        /* Social Icons */
        .social-section {
            margin-top: 25px;
            animation: fadeInUp 1s ease-out 1.1s both;
        }

        .social-title {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
        }

        /* PC */
        @media (min-width: 769px) {
            .social-title {
                font-size: 1rem;
                margin-bottom: 18px;
            }
        }

        /* Telefon */
        @media (max-width: 768px) {
            .social-title {
                font-size: 0.85rem;
                margin-bottom: 15px;
            }
        }

        .social-icons {
            display: flex;
            gap: 18px;
            justify-content: center;
        }

        .social-icon {
            border: 2px solid rgba(212, 168, 83, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            background: rgba(212, 168, 83, 0.1);
            text-decoration: none;
        }

        /* PC */
        @media (min-width: 769px) {
            .social-icon {
                width: 55px;
                height: 55px;
            }

            .social-icon svg {
                width: 26px;
                height: 26px;
            }
        }

        /* Telefon */
        @media (max-width: 768px) {
            .social-icon {
                width: 48px;
                height: 48px;
            }

            .social-icon svg {
                width: 22px;
                height: 22px;
            }
        }

        .social-icon:hover {
            transform: translateY(-5px) scale(1.1);
            border-color: var(--gold);
            background: var(--gold);
            box-shadow: 0 10px 25px rgba(212, 168, 83, 0.4);
        }

        .social-icon svg {
            fill: var(--gold);
            transition: all 0.3s ease;
        }

        .social-icon:hover svg {
            fill: var(--dark);
        }

        /* Newsletter */
        .newsletter {
            margin-top: 40px;
            text-align: center;
            animation: fadeInUp 1s ease-out 1.3s both;
            padding: 0 20px;
        }

        /* PC */
        @media (min-width: 769px) {
            .newsletter h3 {
                font-size: 1.3rem;
                margin-bottom: 18px;
            }

            .newsletter-form {
                max-width: 450px;
            }
        }

        /* Telefon */
        @media (max-width: 768px) {
            .newsletter h3 {
                font-size: 1.1rem;
                margin-bottom: 15px;
            }

            .newsletter-form {
                max-width: 100%;
                width: 100%;
            }
        }

        .newsletter h3 {
            color: var(--gold);
            letter-spacing: 2px;
        }

        .newsletter-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 0 auto;
        }

        .newsletter-form input {
            flex: 1;
            min-width: 200px;
            padding: 16px 22px;
            border: 2px solid rgba(212, 168, 83, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        @media (max-width: 480px) {
            .newsletter-form input {
                min-width: 100%;
                padding: 14px 18px;
            }
        }

        .newsletter-form input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .newsletter-form input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 168, 83, 0.2);
        }

        .newsletter-form button {
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: 50px;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .newsletter-form button {
                width: 100%;
                padding: 14px 25px;
            }
        }

        .newsletter-form button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(212, 168, 83, 0.5);
        }

        /* Footer */
        .footer {
            margin-top: 50px;
            text-align: center;
            animation: fadeIn 1s ease-out 1.5s both;
            padding: 0 20px;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.4);
        }

        /* PC */
        @media (min-width: 769px) {
            .footer p {
                font-size: 0.9rem;
            }
        }

        /* Telefon */
        @media (max-width: 768px) {
            .footer p {
                font-size: 0.8rem;
            }
        }

        .footer .heart {
            color: var(--burgundy);
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Sparkle Animation */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold-light);
            border-radius: 50%;
            animation: sparkle 2s infinite;
            pointer-events: none;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Decorative Elements */
        .deco-circle {
            position: absolute;
            border: 1px solid rgba(212, 168, 83, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }

        .deco-circle-1 {
            width: 350px;
            height: 350px;
            top: -175px;
            right: -175px;
            animation: rotate 20s linear infinite;
        }

        .deco-circle-2 {
            width: 250px;
            height: 250px;
            bottom: -125px;
            left: -125px;
            animation: rotate 15s linear infinite reverse;
        }

        /* Telefonda dekoratif halkaları küçült */
        @media (max-width: 768px) {
            .deco-circle-1 {
                width: 200px;
                height: 200px;
                top: -100px;
                right: -100px;
            }

            .deco-circle-2 {
                width: 150px;
                height: 150px;
                bottom: -75px;
                left: -75px;
            }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Telefonda partikülleri azalt */
        @media (max-width: 768px) {
            .particle:nth-child(4),
            .particle:nth-child(5),
            .particle:nth-child(6),
            .particle:nth-child(7) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation"></div>

    <!-- Decorative Circles -->
    <div class="deco-circle deco-circle-1"></div>
    <div class="deco-circle deco-circle-2"></div>

    <!-- Floating Particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 2.5s;"></div>

    <div class="container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-placeholder" id="logoContainer">
                <img src="https://raw.githubusercontent.com/ayberkgurol80-svg/cankoftedoner/main/fotograf.png" alt="Logo" id="logoImage">
            </div>
        </div>

        <!-- Brand Name -->
        <h1 class="brand-name">CAN KÖFTE &amp; DÖNER SALONU</h1>

        <!-- Main Heading -->
        <div class="main-heading">
            <h1 class="coming-soon">ÇOK YAKINDA</h1>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Description -->
        <div class="description">
            <p>
                Eşsiz <span class="highlight">lezzetler</span> ve unutulmaz <span class="highlight">deneyimler</span> için hazırlanıyoruz. 
                Geleneksel tatları modern bir dokunuşla sunacağımız mekanımız için son kontrollerimizi yapıyoruz.
            </p>
        </div>

        <!-- Location Badge -->
        <div class="location-badge">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
            <span>TEKİRDAĞ / MURATLI</span>
        </div>

        <!-- Social Icons -->
        <div class="social-section">
            <p class="social-title">BİZİ TAKİP EDİN</p>
            <div class="social-icons">
                <div class="social-icon" title="Instagram" onclick="window.open('https://www.instagram.com/cankofte_doner/', '_blank')">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Newsletter -->
        <div class="newsletter">
            <h3>📬 HABERDAR OLUN</h3>
            <form class="newsletter-form" onsubmit="handleSubmit(event)">
                <input type="email" placeholder="E-posta adresiniz" required>
                <button type="submit">GÖNDER</button>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Tüm hakları saklıdır © 2025 <span class="heart">♥</span> Muratlı</p>
        </div>
    </div>

    <script>
        // Newsletter Form Handler
        function handleSubmit(e) {
            e.preventDefault();
            const input = e.target.querySelector('input');
            alert('🎉 ' + input.value + ' adresi kaydedildi! Açılışımızda sizi bilgilendireceğiz.');
            input.value = '';
        }

        // Add dynamic sparkle effects
        document.addEventListener('mousemove', function(e) {
            if (Math.random() > 0.97) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                document.body.appendChild(sparkle);
                setTimeout(function() {
                    sparkle.remove();
                }, 2000);
            }
        });
    </script>
</body>
</html>
