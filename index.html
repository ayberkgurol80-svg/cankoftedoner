<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Can Köfte & Döner Salonu - Çok Yakında</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #E8B923;
            --gold-light: #FFD84D;
            --gold-dark: #C49A1A;
            --dark: #0D0D0D;
            --dark-light: #1A1A1A;
            --burgundy: #722f37;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --gold: #D4A853;
                --gold-light: #F4D03F;
                --gold-dark: #B8902E;
                --dark: #111111;
                --dark-light: #1A1A1A;
            }
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #0D0D0D 0%, #1A1A1A 50%, #0D0D0D 100%);
            color: #FFFFFF;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* Main Container */
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 15px;
            position: relative;
        }

        /* Logo */
        .logo-section {
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-placeholder {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
        }

        .logo-placeholder img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        /* Brand Name */
        .brand-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: clamp(1rem, 5vw, 1.8rem);
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 5px;
            background: linear-gradient(180deg, #FFD84D 0%, #E8B923 50%, #C49A1A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 0.8s ease-out 0.1s both;
        }

        /* Coming Soon */
        .main-heading {
            text-align: center;
            margin-bottom: 15px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .coming-soon {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(1.8rem, 10vw, 4rem);
            letter-spacing: 4px;
            background: linear-gradient(180deg, #FFD84D 0%, #E8B923 50%, #C49A1A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(232, 185, 35, 0.4));
        }

        /* Divider */
        .divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #E8B923, transparent);
            margin: 10px auto;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        /* Description */
        .description {
            max-width: 500px;
            text-align: center;
            padding: 0 20px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .description p {
            font-size: clamp(0.85rem, 3vw, 1rem);
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
        }

        .highlight {
            color: #FFD84D;
            font-weight: 600;
        }

        /* Location Badge */
        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(232, 185, 35, 0.15);
            border: 1px solid rgba(232, 185, 35, 0.4);
            border-radius: 50px;
            padding: 10px 20px;
            margin: 15px 0;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        .location-badge svg {
            width: 18px;
            height: 18px;
            fill: #FFD84D;
        }

        .location-badge span {
            color: #FFD84D;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* Social */
        .social-section {
            margin: 15px 0;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        .social-title {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
        }

        .social-icon {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(232, 185, 35, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(232, 185, 35, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icon svg {
            width: 22px;
            height: 22px;
            fill: #FFD84D;
        }

        .social-icon:hover {
            background: #FFD84D;
            border-color: #FFD84D;
            transform: scale(1.1);
        }

        .social-icon:hover svg {
            fill: #0D0D0D;
        }

        /* Newsletter */
        .newsletter {
            width: 100%;
            max-width: 350px;
            margin: 20px 0;
            text-align: center;
            padding: 0 15px;
            animation: fadeIn 0.8s ease-out 0.7s both;
        }

        .newsletter h3 {
            color: #FFD84D;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .newsletter-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .newsletter-form input {
            width: 100%;
            max-width: 280px;
            padding: 14px 18px;
            border: 2px solid rgba(232, 185, 35, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            color: #FFFFFF;
            font-size: 0.9rem;
            outline: none;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        .newsletter-form input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .newsletter-form input:focus {
            border-color: #FFD84D;
            box-shadow: 0 0 15px rgba(232, 185, 35, 0.2);
        }

        .newsletter-form button {
            width: 100%;
            max-width: 280px;
            padding: 14px 25px;
            background: linear-gradient(180deg, #FFD84D 0%, #E8B923 100%);
            border: none;
            border-radius: 50px;
            color: #0D0D0D;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .newsletter-form button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(232, 185, 35, 0.4);
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding: 20px 15px;
            text-align: center;
            animation: fadeIn 0.8s ease-out 0.8s both;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
        }

        .footer .heart {
            color: #722f37;
            animation: heartbeat 1.5s infinite;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Decorative Circles */
        .deco-circle {
            position: fixed;
            border: 1px solid rgba(232, 185, 35, 0.15);
            border-radius: 50%;
            pointer-events: none;
        }

        .deco-circle-1 {
            width: 150px;
            height: 150px;
            top: -75px;
            right: -75px;
        }

        .deco-circle-2 {
            width: 100px;
            height: 100px;
            bottom: -50px;
            left: -50px;
        }

        /* Particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #E8B923;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 12s infinite ease-in-out;
        }

        .particle:nth-child(1) { left: 15%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 35%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 55%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 75%; animation-delay: 1s; }

        @keyframes float {
            0%, 100% { transform: translateY(100vh); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-20vh); opacity: 0; }
        }

        /* PC - larger screens */
        @media (min-width: 768px) {
            .container {
                padding: 40px 20px;
                justify-content: center;
            }

            .logo-section {
                max-width: 450px;
                margin-bottom: 25px;
            }

            .brand-name {
                font-size: 2.2rem;
                letter-spacing: 6px;
                margin-bottom: 10px;
            }

            .coming-soon {
                font-size: 4.5rem;
                letter-spacing: 8px;
            }

            .divider {
                width: 150px;
                margin: 20px auto;
            }

            .description {
                max-width: 600px;
                margin-bottom: 10px;
            }

            .description p {
                font-size: 1.1rem;
                line-height: 1.8;
            }

            .location-badge {
                padding: 15px 30px;
                gap: 12px;
            }

            .location-badge svg {
                width: 24px;
                height: 24px;
            }

            .location-badge span {
                font-size: 1rem;
                letter-spacing: 3px;
            }

            .social-icon {
                width: 55px;
                height: 55px;
            }

            .social-icon svg {
                width: 26px;
                height: 26px;
            }

            .newsletter h3 {
                font-size: 1.2rem;
                margin-bottom: 15px;
            }

            .newsletter-form {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px;
            }

            .newsletter-form input,
            .newsletter-form button {
                max-width: 250px;
            }

            .deco-circle-1 {
                width: 300px;
                height: 300px;
                top: -150px;
                right: -150px;
            }

            .deco-circle-2 {
                width: 200px;
                height: 200px;
                bottom: -100px;
                left: -100px;
            }

            .particle:nth-child(5),
            .particle:nth-child(6),
            .particle:nth-child(7) {
                display: block;
            }
        }
    </style>
</head>
<body>
    <!-- Decorative -->
    <div class="deco-circle deco-circle-1"></div>
    <div class="deco-circle deco-circle-2"></div>

    <!-- Particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-placeholder">
                <img src="https://raw.githubusercontent.com/ayberkgurol80-svg/cankoftedoner/main/fotograf.png" alt="Logo">
            </div>
        </div>

        <!-- Brand -->
        <h1 class="brand-name">CAN KÖFTE &amp; DÖNER SALONU</h1>

        <!-- Coming Soon -->
        <div class="main-heading">
            <h1 class="coming-soon">ÇOK YAKINDA</h1>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Description -->
        <div class="description">
            <p>Eşsiz <span class="highlight">lezzetler</span> ve unutulmaz <span class="highlight">deneyimler</span> için hazırlanıyoruz. Geleneksel tatları modern bir dokunuşla sunacağımız mekanımız için son kontrollerimizi yapıyoruz.</p>
        </div>

        <!-- Location -->
        <div class="location-badge">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <span>TEKİRDAĞ / MURATLI</span>
        </div>

        <!-- Social -->
        <div class="social-section">
            <p class="social-title">BİZİ TAKİP EDİN</p>
            <div class="social-icons">
                <a class="social-icon" href="https://www.instagram.com/cankofte_doner/" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                </a>
            </div>
        </div>

        <!-- Newsletter -->
        <div class="newsletter">
            <h3>📬 HABERDAR OLUN</h3>
            <form class="newsletter-form" onsubmit="handleSubmit(event)">
                <input type="email" placeholder="E-posta adresiniz" required>
                <button type="submit">GÖNDER</button>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Tüm hakları saklıdır © 2025 <span class="heart">♥</span> Muratlı</p>
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const input = e.target.querySelector('input');
            alert('🎉 ' + input.value + ' adresi kaydedildi! Açılışımızda sizi bilgilendireceğiz.');
            input.value = '';
        }
    </script>
</body>
</html>
