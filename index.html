<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Can Köfte & Döner Salonu - Çok Yakında</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #F5C842;
            --gold-rgb: 245, 200, 66;
            --dark: #4a4a4a;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            color: #FFFFFF;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #4a4a4a 0%, #5a5a5a 50%, #4a4a4a 100%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(245, 200, 66, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(114, 47, 55, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(245, 200, 66, 0.08) 0%, transparent 60%);
            animation: bgPulse 10s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #F5C842;
            border-radius: 50%;
            opacity: 0;
            animation: float 12s infinite ease-in-out;
        }

        @keyframes float {
            0% { 
                transform: translateY(100vh) rotate(0deg); 
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            50% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% { 
                transform: translateY(-20vh) rotate(720deg); 
                opacity: 0;
            }
        }

        /* Main Container - Tam ortada */
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
            position: relative;
            z-index: 1;
        }

        /* Logo */
        .logo-section {
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-placeholder {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
        }

        .logo-placeholder img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        /* Brand Name */
        .brand-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: clamp(1.2rem, 6vw, 2rem);
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 8px;
            color: var(--gold);
            animation: fadeIn 0.8s ease-out 0.1s both;
            text-shadow: 0 0 20px rgba(245, 200, 66, 0.3);
        }

        /* Coming Soon */
        .main-heading {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .coming-soon {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2.2rem, 12vw, 4.5rem);
            letter-spacing: 5px;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(245, 200, 66, 0.4);
        }

        /* Divider */
        .divider {
            width: 120px;
            height: 2px;
            background: var(--gold);
            margin: 15px auto;
            animation: fadeIn 0.8s ease-out 0.3s both;
            box-shadow: 0 0 10px rgba(245, 200, 66, 0.4);
        }

        /* Description */
        .description {
            max-width: 500px;
            text-align: center;
            padding: 0 25px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .description p {
            font-size: clamp(1rem, 3.5vw, 1.1rem);
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.85);
        }

        .highlight {
            color: var(--gold);
            font-weight: 600;
        }

        /* Location Badge */
        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(245, 200, 66, 0.12);
            border: 1px solid rgba(245, 200, 66, 0.35);
            border-radius: 50px;
            padding: 12px 25px;
            margin: 25px 0;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        .location-badge svg {
            width: 22px;
            height: 22px;
            fill: var(--gold);
        }

        .location-badge span {
            color: var(--gold);
            font-size: clamp(0.85rem, 3vw, 1rem);
            font-weight: 500;
            letter-spacing: 3px;
        }

        /* Social */
        .social-section {
            margin: 20px 0;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        .social-title {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
        }

        .social-icon {
            width: 55px;
            height: 55px;
            border: 2px solid rgba(245, 200, 66, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(245, 200, 66, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icon svg {
            width: 26px;
            height: 26px;
            fill: var(--gold);
        }

        .social-icon:hover {
            background: var(--gold);
            border-color: var(--gold);
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(245, 200, 66, 0.5);
        }

        .social-icon:hover svg {
            fill: #333333;
        }

        /* Newsletter */
        .newsletter {
            width: 100%;
            max-width: 400px;
            margin: 25px 0;
            text-align: center;
            padding: 0 20px;
            animation: fadeIn 0.8s ease-out 0.7s both;
        }

        .newsletter h3 {
            color: var(--gold);
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        .newsletter-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .newsletter-form input {
            width: 100%;
            max-width: 300px;
            padding: 16px 22px;
            border: 2px solid rgba(245, 200, 66, 0.35);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.08);
            color: #FFFFFF;
            font-size: 1rem;
            outline: none;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        .newsletter-form input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .newsletter-form input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(245, 200, 66, 0.25);
        }

        .newsletter-form button {
            width: 100%;
            max-width: 300px;
            padding: 16px 30px;
            background: var(--gold);
            border: none;
            border-radius: 50px;
            color: #333333;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .newsletter-form button:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(245, 200, 66, 0.5);
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            padding: 20px 15px;
            text-align: center;
            animation: fadeIn 0.8s ease-out 0.8s both;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        .footer .heart {
            color: var(--gold);
            animation: heartbeat 1.5s infinite;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Decorative Circles */
        .deco-circle {
            position: fixed;
            border: 1px solid rgba(245, 200, 66, 0.12);
            border-radius: 50%;
            pointer-events: none;
        }

        .deco-circle-1 {
            width: 200px;
            height: 200px;
            top: -100px;
            right: -100px;
            animation: rotate 30s linear infinite;
        }

        .deco-circle-2 {
            width: 150px;
            height: 150px;
            bottom: -75px;
            left: -75px;
            animation: rotate 25s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* PC - larger screens */
        @media (min-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            .logo-section {
                max-width: 450px;
                margin-bottom: 30px;
            }

            .brand-name {
                font-size: 2.5rem;
                letter-spacing: 8px;
                margin-bottom: 12px;
            }

            .coming-soon {
                font-size: 5rem;
                letter-spacing: 10px;
            }

            .divider {
                width: 180px;
                margin: 25px auto;
            }

            .description {
                max-width: 650px;
            }

            .description p {
                font-size: 1.2rem;
                line-height: 1.9;
            }

            .location-badge {
                padding: 18px 35px;
                gap: 15px;
            }

            .location-badge svg {
                width: 28px;
                height: 28px;
            }

            .location-badge span {
                font-size: 1.1rem;
                letter-spacing: 4px;
            }

            .social-icon {
                width: 60px;
                height: 60px;
            }

            .social-icon svg {
                width: 28px;
                height: 28px;
            }

            .newsletter h3 {
                font-size: 1.3rem;
                margin-bottom: 18px;
            }

            .newsletter-form {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }

            .newsletter-form input,
            .newsletter-form button {
                max-width: 280px;
            }

            .deco-circle-1 {
                width: 400px;
                height: 400px;
                top: -200px;
                right: -200px;
            }

            .deco-circle-2 {
                width: 300px;
                height: 300px;
                bottom: -150px;
                left: -150px;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation"></div>

    <!-- Decorative Circles -->
    <div class="deco-circle deco-circle-1"></div>
    <div class="deco-circle deco-circle-2"></div>

    <!-- Particles -->
    <div class="particle" style="left: 8%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 35%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 65%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 92%; animation-delay: 2.5s;"></div>

    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-placeholder">
                <img src="https://raw.githubusercontent.com/ayberkgurol80-svg/cankoftedoner/main/fotograf.png" alt="Logo">
            </div>
        </div>

        <!-- Brand -->
        <h1 class="brand-name">CAN KÖFTE &amp; DÖNER SALONU</h1>

        <!-- Coming Soon -->
        <div class="main-heading">
            <h1 class="coming-soon">ÇOK YAKINDA</h1>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Description -->
        <div class="description">
            <p>Eşsiz <span class="highlight">lezzetler</span> ve unutulmaz <span class="highlight">deneyimler</span> için hazırlanıyoruz. Geleneksel tatları modern bir dokunuşla sunacağımız mekanımız için son kontrollerimizi yapıyoruz.</p>
        </div>

        <!-- Location -->
        <div class="location-badge">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <span>TEKİRDAĞ / MURATLI</span>
        </div>

        <!-- Social -->
        <div class="social-section">
            <p class="social-title">BİZİ TAKİP EDİN</p>
            <div class="social-icons">
                <a class="social-icon" href="https://www.instagram.com/cankofte_doner/" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                </a>
            </div>
        </div>

        <!-- Newsletter -->
        <div class="newsletter">
            <h3>📬 HABERDAR OLUN</h3>
            <form class="newsletter-form" onsubmit="handleSubmit(event)">
                <input type="email" placeholder="E-posta adresiniz" required>
                <button type="submit">GÖNDER</button>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>Tüm hakları saklıdır © 2025 <span class="heart">♥</span> Muratlı</p>
        </div>
    </div>

    <script>
        // Newsletter Form Handler
        function handleSubmit(e) {
            e.preventDefault();
            const input = e.target.querySelector('input');
            alert('🎉 ' + input.value + ' adresi kaydedildi! Açılışımızda sizi bilgilendireceğiz.');
            input.value = '';
        }
    </script>
</body>
</html>
